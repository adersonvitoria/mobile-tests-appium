name: Mobile Tests CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  mobile-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configurar Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependências
        run: npm ci

      - name: Baixar APK do app de demonstração
        run: |
          mkdir -p apps
          curl -L -o apps/wdio-demo-app.apk \
            "https://github.com/webdriverio/native-demo-app/releases/download/v1.0.8/android.wdio.native.app.v1.0.8.apk"

      - name: Habilitar KVM para emulador Android
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-30-${{ runner.os }}

      - name: Executar testes mobile
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_5
          ram-size: 4096M
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save
          disable-animations: true
          script: |
            adb wait-for-device
            sleep 10
            npx appium driver install uiautomator2 || npx appium driver update uiautomator2 || true
            npx wdio run wdio.conf.ts || true

      - name: Gerar Allure Report
        if: always()
        run: npx allure generate allure-results -o allure-report --clean

      - name: Upload Allure Results (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

  deploy-report:
    needs: [mobile-tests]
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  summary:
    needs: [mobile-tests, deploy-report]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Resumo da Execução
        run: |
          echo "## 📱 Mobile Tests - Resumo" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Componente | Status | Ferramenta |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Testes Mobile | ${{ needs.mobile-tests.result }} | Appium + WebdriverIO |" >> $GITHUB_STEP_SUMMARY
          echo "| Allure Report | ${{ needs.deploy-report.result }} | GitHub Pages |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Allure Report:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY
